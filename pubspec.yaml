name: meteomada
description: "Toerana - Application météo pour Madagascar"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.1.0
  go_router: ^13.0.0
  provider: ^6.1.1
  sembast: ^3.7.0+1
  sembast_web: ^2.4.0+1
  path_provider: ^2.1.0
  http: ^1.3.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.0
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

name: meteomada
description: "MeteoMada - Application météo pour Madagascar"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  go_router: ^13.0.0
  provider: ^6.1.1
  sembast: ^3.7.0+1
  sembast_web: ^2.4.0+1
  path_provider: ^2.1.0
  http: ^1.3.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.0
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
